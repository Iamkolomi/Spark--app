<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Spark ✦ Friend Match</title>
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    :root {
      --blue: #0A84FF;
      --blue-light: #64B5FF;
      --blue-dark: #0055CC;
      --gold: #F59E0B;
      --gold-bright: #FBBF24;
      --light-bg: #F5F5F7;
      --light-surface: #FFFFFF;
      --light-text: #1D1D1F;
      --light-secondary: #86868B;
      --dark-bg: #000000;
      --dark-surface: #1C1C1E;
      --dark-text: #F5F5F7;
      --dark-secondary: #A1A1A6;
      --radius: 20px;
      --shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    body {
      background: var(--light-bg);
      color: var(--light-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      padding: 10px;
    }

    body.dark {
      background: var(--dark-bg);
      color: var(--dark-text);
    }

    .app-container {
      width: 100%;
      max-width: 400px;
      height: 95vh;
      max-height: 850px;
      background: var(--light-surface);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 50px rgba(0,0,0,0.15);
      position: relative;
      transition: background 0.3s;
    }

    body.dark .app-container {
      background: var(--dark-surface);
    }

    /* Screens & tabs container */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 20px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.active { display: flex; }

    /* Onboarding specific */
    .onboarding-slide {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      animation: fadeSlide 0.3s ease;
    }
    .onboarding-slide.active { display: flex; }
    
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .btn {
      background: var(--blue);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(10,132,255,0.3);
      margin-top: 16px;
      width: 100%;
    }
    .btn:active { transform: scale(0.96); opacity: 0.9; }
    .btn.secondary {
      background: transparent;
      color: var(--blue);
      box-shadow: none;
      border: 1px solid var(--blue);
    }
    body.dark .btn.secondary { color: var(--blue-light); border-color: var(--blue-light); }

    input, select, textarea {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #E5E5EA;
      background: var(--light-bg);
      font-size: 16px;
      margin-top: 10px;
      outline: none;
      transition: 0.2s;
    }
    body.dark input, body.dark select, body.dark textarea {
      background: #2C2C2E;
      border-color: #3A3A3C;
      color: white;
    }
    input:focus, textarea:focus { border-color: var(--blue); }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      background: #E5E5EA;
      margin: 10px auto;
      border: 3px solid var(--blue);
    }

    .tab-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.05);
      transition: 0.3s;
    }
    body.dark .tab-bar {
      background: rgba(28,28,30,0.8);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--light-secondary);
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .tab-item.active { color: var(--blue); }
    .badge {
      position: absolute;
      top: -6px;
      right: -10px;
      background: #FF3B30;
      color: white;
      border-radius: 10px;
      font-size: 10px;
      padding: 2px 6px;
      font-weight: bold;
    }

    /* Card styles */
    .match-card {
      background: var(--light-surface);
      border-radius: 32px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin: 10px 0;
      transition: 0.2s;
    }
    body.dark .match-card { background: #2C2C2E; }

    .spark-score {
      font-weight: 700;
      font-size: 24px;
      color: var(--gold);
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <!-- Onboarding Screen -->
  <div id="onboardingScreen" class="screen active"></div>

  <!-- Main Tabs (Match, Chats, Profile) -->
  <div id="mainScreen" class="screen" style="padding: 0; display: none;">
    <div style="flex:1; overflow-y: auto; padding: 20px;" id="tabContent"></div>
    <div class="tab-bar">
      <div class="tab-item" data-tab="profile"><span>👤</span><span>Profile</span><span class="badge" id="profileBadge" style="display:none;">0</span></div>
      <div class="tab-item active" data-tab="match"><span>✨</span><span>Match</span></div>
      <div class="tab-item" data-tab="chats"><span>💬</span><span>Chats</span></div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----------------------------------- STATE -----------------------------------
    const tg = window.Telegram?.WebApp;
    let currentUser = null;
    let users = []; // mock profiles
    let currentMatchIndex = 0;
    let friendRequests = []; // incoming to current user
    let outgoingRequests = [];
    let chats = [];
    let activeTab = 'match';

    // Onboarding state
    let onboardingStep = 0;
    let onboardingData = {
      displayName: '', username: '', photo: '', age: '', gender: '', lookingFor: '', city: '', country: '', bio: '',
      answers: [] // array of 20 answers
    };

    // Mock profiles for matching
    function generateMockUsers() {
      return [
        { id: 'u1', displayName: 'Alex Rivera', username: 'alex_r', photo: 'https://i.pravatar.cc/150?img=11', age: 26, gender: 'Male', city: 'Barcelona', country: 'Spain', bio: 'Love exploring cities and deep talks.', answers: generateRandomAnswers() },
        { id: 'u2', displayName: 'Jamie Lee', username: 'jamielee', photo: 'https://i.pravatar.cc/150?img=5', age: 24, gender: 'Female', city: 'Seoul', country: 'South Korea', bio: 'Coffee addict and meme lover.', answers: generateRandomAnswers() },
        { id: 'u3', displayName: 'Taylor Chen', username: 'taychen', photo: 'https://i.pravatar.cc/150?img=12', age: 28, gender: 'Non-binary', city: 'Toronto', country: 'Canada', bio: 'Creative soul into art and hiking.', answers: generateRandomAnswers() },
      ];
    }

    function generateRandomAnswers() {
      let a = [];
      for(let i=0; i<15; i++) a.push(Math.random()>0.5 ? 'A' : 'B');
      const lists = [
        ['Nature','Eating out','Nightlife'], ['Life struggles','Pop culture'], ['Voice notes','Meme sharing'], ['Use humor','Address immediately'], ['Remember details','Check in']
      ];
      lists.forEach(l => a.push(l));
      return a;
    }

    // ----------------------------------- UTILS -----------------------------------
    function calculateSpark(myAnswers, otherAnswers) {
      let abMatch = 0;
      for(let i=0; i<15; i++) if(myAnswers[i] === otherAnswers[i]) abMatch++;
      const abScore = (abMatch/15)*100;
      
      let listSum = 0;
      for(let i=15; i<20; i++) {
        const mySet = new Set(myAnswers[i] || []);
        const otherSet = new Set(otherAnswers[i] || []);
        if(mySet.size===0 || otherSet.size===0) { listSum+=0; continue; }
        let overlap = [...mySet].filter(x=>otherSet.has(x)).length;
        listSum += (overlap / Math.max(mySet.size, otherSet.size)) * 100;
      }
      const listScore = listSum/5;
      return Math.round((abScore*0.5)+(listScore*0.5));
    }

    function renderSparkBreakdown(myAns, otherAns) {
      let abMatch=0; for(let i=0;i<15;i++) if(myAns[i]===otherAns[i]) abMatch++;
      return `<b>${abMatch}/15 same choices</b><br>✨ Shared vibes & interests.`;
    }

    // ----------------------------------- UI RENDER -----------------------------------
    const appContainer = document.getElementById('appContainer');
    const onboardingScreen = document.getElementById('onboardingScreen');
    const mainScreen = document.getElementById('mainScreen');
    const tabContent = document.getElementById('tabContent');
    const profileBadge = document.getElementById('profileBadge');

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function updateBadges() {
      const incoming = friendRequests.filter(r=>r.status==='pending').length;
      if(profileBadge) {
        profileBadge.style.display = incoming>0 ? 'block':'none';
        profileBadge.textContent = incoming;
      }
    }

    function renderOnboarding() {
      const steps = [
        () => `<div class="onboarding-slide active"><h1>✨ Find your Spark</h1><p style="margin:20px;color:gray;">Answer 20 fun questions to discover friends who truly get you.</p><button class="btn" onclick="nextOnboarding()">Get Started</button></div>`,
        () => `<div class="onboarding-slide active"><label>Display Name</label><input id="dispName" value="${onboardingData.displayName}" placeholder="Your name"></div>`,
        () => `<div class="onboarding-slide active"><label>Username</label><input id="username" value="${onboardingData.username}" placeholder="@username"></div>`,
        () => `<div class="onboarding-slide active"><label>Profile Photo</label><img class="profile-img" src="${onboardingData.photo || 'https://i.pravatar.cc/150?u=default'}" id="profilePreview"><input type="file" accept="image/*" id="photoInput" style="display:none"><button class="btn secondary" onclick="document.getElementById('photoInput').click()">Upload Photo</button></div>`,
        () => `<div class="onboarding-slide active"><label>Age</label><input type="number" id="age" value="${onboardingData.age}" min="13" max="99"></div>`,
        () => `<div class="onboarding-slide active"><label>Gender</label><select id="gender">${['Male','Female','Non-binary','Prefer not to say'].map(g=>`<option ${onboardingData.gender===g?'selected':''}>${g}</option>`)}</select></div>`,
        () => `<div class="onboarding-slide active"><label>Looking for</label><select id="lookingFor">${['Male','Female','Non-binary','Anyone'].map(g=>`<option ${onboardingData.lookingFor===g?'selected':''}>${g}</option>`)}</select></div>`,
        () => `<div class="onboarding-slide active"><label>City</label><input id="city" value="${onboardingData.city}"><label>Country</label><input id="country" value="${onboardingData.country}"></div>`,
        () => renderQuestionnaireSlide(),
        () => `<div class="onboarding-slide active"><label>Bio (150-300 chars)</label><textarea id="bio" maxlength="300">${onboardingData.bio}</textarea></div>`,
        () => `<div class="onboarding-slide active"><h2>🎉 You're all set!</h2><p>Start matching now.</p><button class="btn" onclick="finishOnboarding()">Enter Spark</button></div>`
      ];
      onboardingScreen.innerHTML = steps[onboardingStep]();
      if(onboardingStep===3) {
        document.getElementById('photoInput')?.addEventListener('change', (e)=> {
          const file = e.target.files[0];
          if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => { onboardingData.photo = ev.target.result; document.getElementById('profilePreview').src = ev.target.result; };
            reader.readAsDataURL(file);
          }
        });
      }
    }

    function renderQuestionnaireSlide() {
      const qIndex = onboardingData.answers.length;
      if(qIndex >= 20) return '';
      if(qIndex < 15) {
        const questions = [
          ['🌙 Night owl','☀️ Early bird'],['🎉 Recharges in groups','🧘 Recharges alone'],['🎲 Spontaneous','📋 Meticulous'],
          ['🧠 Deep conversations','😄 Light banter'],['🌲 Outdoorsy','🛋️ Indoorsy'],['🍜 Try new foods','🍕 Comfort food'],
          ['🎨 Creative','📊 Logical'],['🎊 Big parties','🕯️ Small hangs'],['🗣️ Direct/blunt','🤝 Gentle/diplomatic'],
          ['📱 Frequent texter','📞 Prefers calls'],['👤 1-on-1 hangs','👥 Group hangs'],['⏰ Strictly punctual','🌊 Go-with-the-flow'],
          ['🌌 Big-picture thinker','🔍 Detail-oriented doer'],['💬 Open about feelings','🔒 Processes alone'],['😏 Dry/sarcastic humor','🥰 Warm/silly humor']
        ];
        return `<div class="onboarding-slide active"><h3>Q${qIndex+1}/20</h3><p>${questions[qIndex][0]} vs ${questions[qIndex][1]}</p>
        <button class="btn" onclick="answerQuestion('A')">${questions[qIndex][0]}</button>
        <button class="btn secondary" onclick="answerQuestion('B')">${questions[qIndex][1]}</button></div>`;
      } else {
        const listQs = [
          {q:'What hangouts excite you?', opts:['Nature','Eating out','Nightlife','Cultural','Active sports','Cozy indoor','Shopping','Creative','Festivals','Walking']},
          {q:'What do you talk about?', opts:['Life struggles','Relationships','Career','Pop culture','Deep philosophy','Politics','Sports','Travel','Random nonsense','Shared hobbies']},
          {q:'How do you prefer to communicate?', opts:['Voice notes','Short texts','Phone calls','Video calls','Meme sharing','In-person only','Group chats','One-on-one DMs','Links','Weekly check-ins']},
          {q:'Conflict style?', opts:['Address immediately','Take space','Use humor','Prefer text','Avoid unless dealbreaker','Apologize quickly','Stand ground','Ask third friend','Write thoughts','Let small things go']},
          {q:'What makes you feel seen?', opts:['Remember details','Initiate plans','Check in','Give honest feedback','Celebrate wins','Reliable','Make me laugh','Vulnerable','Respect boundaries','Include me']}
        ];
        const current = listQs[qIndex-15];
        return `<div class="onboarding-slide active"><h3>${current.q}</h3><div id="listOptions">${current.opts.map(o=>`<label style="display:block;margin:6px;"><input type="checkbox" value="${o}"> ${o}</label>`).join('')}</div><button class="btn" onclick="submitListAnswer()">Next</button></div>`;
      }
    }

    window.answerQuestion = function(ans) {
      onboardingData.answers.push(ans);
      onboardingStep++;
      renderOnboarding();
    };
    window.submitListAnswer = function() {
      const checks = [...document.querySelectorAll('#listOptions input:checked')].map(c=>c.value);
      if(checks.length===0) { alert('Select at least one'); return; }
      onboardingData.answers.push(checks);
      onboardingStep++;
      renderOnboarding();
    };
    window.nextOnboarding = function() {
      const fields = ['dispName','username','age','gender','lookingFor','city','country','bio'];
      if(onboardingStep===1) onboardingData.displayName = document.getElementById('dispName')?.value || '';
      if(onboardingStep===2) onboardingData.username = document.getElementById('username')?.value || '';
      if(onboardingStep===4) onboardingData.age = document.getElementById('age')?.value;
      if(onboardingStep===5) onboardingData.gender = document.getElementById('gender')?.value;
      if(onboardingStep===6) onboardingData.lookingFor = document.getElementById('lookingFor')?.value;
      if(onboardingStep===7) { onboardingData.city = document.getElementById('city')?.value; onboardingData.country = document.getElementById('country')?.value; }
      if(onboardingStep===9) onboardingData.bio = document.getElementById('bio')?.value;
      if(onboardingStep===8) return; // handled by question buttons
      onboardingStep++;
      renderOnboarding();
    };
    window.finishOnboarding = function() {
      currentUser = {
        id: 'me',
        ...onboardingData,
        photo: onboardingData.photo || 'https://i.pravatar.cc/150?u=me',
      };
      users = generateMockUsers();
      showScreen('mainScreen');
      renderTab('match');
      updateBadges();
    };

    // Tabs
    function renderTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab-item[data-tab=${tab}]`)?.classList.add('active');
      if(tab==='match') renderMatchTab();
      else if(tab==='chats') renderChatsTab();
      else if(tab==='profile') renderProfileTab();
    }

    function renderMatchTab() {
      if(!currentUser) return;
      const otherUsers = users.filter(u=>u.id!==currentUser.id);
      if(otherUsers.length===0) { tabContent.innerHTML='<p>No profiles nearby.</p>'; return; }
      const profile = otherUsers[currentMatchIndex % otherUsers.length];
      const spark = calculateSpark(currentUser.answers, profile.answers);
      const shared = spark>70 ? 'Music, Coffee' : 'Outdoors';
      tabContent.innerHTML = `
        <div class="match-card">
          <img src="${profile.photo}" width="100" height="100" style="border-radius:50%;">
          <h2>${profile.displayName}, ${profile.age}</h2>
          <p>${profile.city}, ${profile.country}</p>
          <div class="spark-score" onclick="alert('${renderSparkBreakdown(currentUser.answers, profile.answers)}')">${spark}% Spark ✨</div>
          <p>${profile.bio || ''}</p>
          <div style="display:flex; gap:12px; width:100%; margin-top:10px;">
            <button class="btn secondary" style="flex:1;" onclick="skipProfile()">❌ Skip</button>
            <button class="btn" style="flex:1; background:#F59E0B;" onclick="sendLike('${profile.id}')">❤️ Like</button>
          </div>
        </div>`;
    }
    window.skipProfile = () => { currentMatchIndex++; renderMatchTab(); };
    window.sendLike = (profileId) => {
      const target = users.find(u=>u.id===profileId);
      if(!target) return;
      outgoingRequests.push({to: profileId, status:'pending'});
      friendRequests.push({from: currentUser.id, to: profileId, status:'pending', user: currentUser});
      alert('Friend request sent!');
      currentMatchIndex++; renderMatchTab(); updateBadges();
    };

    function renderChatsTab() {
      const mutual = chats.filter(c=>c.mutual);
      tabContent.innerHTML = mutual.length ? mutual.map(c=>`<div class="match-card"><b>${c.with}</b><p>Spark ${c.spark}%</p></div>`).join('') : '<p>No chats yet. Match to start!</p>';
    }

    function renderProfileTab() {
      if(!currentUser) return;
      const incoming = friendRequests.filter(r=>r.to===currentUser.id && r.status==='pending');
      tabContent.innerHTML = `
        <div style="text-align:center;">
          <img src="${currentUser.photo}" width="80" height="80" style="border-radius:50%;">
          <h2>${currentUser.displayName}</h2><p>@${currentUser.username}</p>
          <p>${currentUser.age}, ${currentUser.city}</p>
        </div>
        <h4>Incoming Requests</h4>
        ${incoming.map(r=>`<div style="display:flex;justify-content:space-between;">${r.user?.displayName||'User'} <button onclick="acceptRequest('${r.from}')">Accept</button></div>`).join('')||'None'}
      `;
    }
    window.acceptRequest = (fromId) => {
      friendRequests = friendRequests.filter(r=>!(r.from===fromId && r.to===currentUser.id));
      chats.push({with: users.find(u=>u.id===fromId)?.displayName, mutual:true, spark:85});
      updateBadges(); renderProfileTab();
    };

    // Tab listeners
    document.querySelectorAll('.tab-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const tab = item.dataset.tab;
        renderTab(tab);
      });
    });

    // Init Telegram
    if(tg) {
      tg.ready();
      tg.expand();
      onboardingData.displayName = tg.initDataUnsafe?.user?.first_name || '';
      onboardingData.username = tg.initDataUnsafe?.user?.username || '';
      if(tg.initDataUnsafe?.user?.photo_url) onboardingData.photo = tg.initDataUnsafe.user.photo_url;
      document.body.classList.add(tg.colorScheme === 'dark' ? 'dark' : '');
    }
    renderOnboarding();
  })();
</script>
</body>
</html>
